<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hong Kong Food Discourse Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
}
#map{
    height:100vh;
}
.panel{
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
    background:white;
    padding:15px;
    width:300px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
.panel h2{
    margin:0 0 10px 0;
    font-size:18px;
}
.panel input, .panel select{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
}
.popup-img{
    width:100%;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="panel">
    <h2>Hong Kong Food Map</h2>

    <input type="text" id="searchBox" placeholder="Search restaurant...">

    <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Tea Cafe">Tea Cafe</option>
        <option value="Dim Sum">Dim Sum</option>
        <option value="Dessert">Dessert</option>
        <option value="Seafood">Seafood</option>
        <option value="Noodles">Noodles</option>
    </select>

    <select id="registerFilter">
        <option value="all">All Registers</option>
        <option value="informal">Informal</option>
        <option value="formal">Formal</option>
        <option value="hybrid">Hybrid</option>
    </select>

    <small>
        <b>Discourse Focus:</b><br>
        This project examines how food descriptions in Hong Kong construct
        identity through register and evaluative language.
    </small>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([22.3193,114.1694],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

var restaurants = [
{ name:"Lan Fong Yuen", lat:22.2819, lng:114.1550, category:"Tea Cafe", register:"hybrid", appraisal:"nostalgic", dish:"Milk tea and French toast", img:"https://images.unsplash.com/photo-1552566626-52f8b828add9?w=400" },
{ name:"Tim Ho Wan", lat:22.3240, lng:114.1680, category:"Dim Sum", register:"formal", appraisal:"premium", dish:"BBQ pork buns", img:"https://images.unsplash.com/photo-1563245372-f21724e3856d?w=400" },
{ name:"Australia Dairy", lat:22.3045, lng:114.1710, category:"Tea Cafe", register:"informal", appraisal:"efficient", dish:"Scrambled eggs", img:"https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400" },
{ name:"Mak's Noodles", lat:22.2831, lng:114.1548, category:"Noodles", register:"informal", appraisal:"authentic", dish:"Wonton noodles", img:"https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?w=400" },
{ name:"Kau Kee", lat:22.2842, lng:114.1516, category:"Noodles", register:"informal", appraisal:"traditional", dish:"Beef brisket noodles", img:"https://images.unsplash.com/photo-1617093727343-374698b1b08d?w=400" }
];

// 自动生成更多点（避免手动写50个）
for(let i=1;i<=45;i++){
    restaurants.push({
        name:"Local Food Spot " + i,
        lat:22.28 + Math.random()*0.08,
        lng:114.14 + Math.random()*0.08,
        category:["Tea Cafe","Dim Sum","Dessert","Seafood","Noodles"][i%5],
        register:["informal","formal","hybrid"][i%3],
        appraisal:["authentic","premium","casual","nostalgic"][i%4],
        dish:"Signature local dish",
        img:"https://images.unsplash.com/photo-1544025162-d76694265947?w=400"
    });
}

var markers = [];

function renderMarkers(){
    markers.forEach(m => map.removeLayer(m));
    markers=[];

    var search = document.getElementById("searchBox").value.toLowerCase();
    var category = document.getElementById("categoryFilter").value;
    var reg = document.getElementById("registerFilter").value;

    restaurants.forEach(r=>{
        if(search && !r.name.toLowerCase().includes(search)) return;
        if(category !== "all" && r.category !== category) return;
        if(reg !== "all" && r.register !== reg) return;

        var marker = L.marker([r.lat,r.lng]).addTo(map);

        marker.bindPopup(`
            <div style="width:230px">
                <img class="popup-img" src="${r.img}">
                <h3>${r.name}</h3>
                <b>Category:</b> ${r.category}<br>
                <b>Dish:</b> ${r.dish}<br><br>

                <b>Discourse Analysis</b><br>
                <b>Register:</b> ${r.register}<br>
                <b>Appraisal:</b> ${r.appraisal}
            </div>
        `);

        markers.push(marker);
    });
}

document.getElementById("searchBox").addEventListener("input",renderMarkers);
document.getElementById("categoryFilter").addEventListener("change",renderMarkers);
document.getElementById("registerFilter").addEventListener("change",renderMarkers);

renderMarkers();
</script>

</body>
</html>
