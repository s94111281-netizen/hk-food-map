<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hong Kong Food Discourse Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

.panel{
 position:absolute;
 top:10px;
 left:10px;
 z-index:1000;
 background:white;
 padding:15px;
 width:280px;
 border-radius:10px;
 box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.panel input, .panel select{
 width:100%;
 padding:6px;
 margin-bottom:8px;
}

.popup img{
 width:100%;
 border-radius:8px;
}
</style>
</head>

<body>

<div class="panel">
<b>HK Food Discourse Map</b><br><br>

<input id="search" placeholder="Search...">

<select id="reg">
<option value="all">All Register</option>
<option value="informal">Informal</option>
<option value="formal">Formal</option>
<option value="hybrid">Hybrid</option>
</select>

<small>
This project explores how food discourse constructs identity in Hong Kong.
</small>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([22.3193,114.1694],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);

var data = [

{
name:"Lan Fong Yuen",
lat:22.2819,lng:114.1550,
reg:"hybrid",
app:"nostalgic",
dish:"Milk tea, French toast",
desc:"Mix of Cantonese and English reflects colonial identity.",
img:"https://upload.wikimedia.org/wikipedia/commons/6/6f/HK_LanFongYuen.jpg"
},

{
name:"Tim Ho Wan",
lat:22.3240,lng:114.1680,
reg:"formal",
app:"premium",
dish:"BBQ pork buns",
desc:"Standardized menu emphasizes global branding.",
img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/TimHoWan.jpg"
},

{
name:"Australia Dairy Company",
lat:22.3045,lng:114.1710,
reg:"informal",
app:"efficient",
dish:"Scrambled eggs, toast",
desc:"Minimal discourse reflects fast dining culture.",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Australia_Dairy_Company.jpg"
},

{
name:"Mak's Noodles",
lat:22.2831,lng:114.1548,
reg:"informal",
app:"authentic",
dish:"Wonton noodles",
desc:"Simple wording highlights tradition.",
img:"https://upload.wikimedia.org/wikipedia/commons/4/45/Wonton_noodles.jpg"
},

{
name:"Kau Kee",
lat:22.2842,lng:114.1516,
reg:"informal",
app:"traditional",
dish:"Beef brisket noodles",
desc:"Direct naming reflects everyday discourse.",
img:"https://upload.wikimedia.org/wikipedia/commons/3/30/Beef_brisket_noodle.jpg"
},

{
name:"Yat Lok",
lat:22.2829,lng:114.1554,
reg:"semi-formal",
app:"famous",
dish:"Roast goose",
desc:"Combines prestige and accessibility.",
img:"https://upload.wikimedia.org/wikipedia/commons/6/6b/Roast_goose.jpg"
},

{
name:"Lung King Heen",
lat:22.2867,lng:114.1578,
reg:"formal",
app:"luxury",
dish:"Fine Cantonese cuisine",
desc:"Formal discourse constructs exclusivity.",
img:"https://upload.wikimedia.org/wikipedia/commons/1/12/Lung_King_Heen.jpg"
},

{
name:"Tsui Wah",
lat:22.2820,lng:114.1555,
reg:"standardized",
app:"casual",
dish:"Milk tea, noodles",
desc:"Chain discourse reflects branding.",
img:"https://upload.wikimedia.org/wikipedia/commons/2/2e/Tsui_Wah.jpg"
},

{
name:"Honeymoon Dessert",
lat:22.2960,lng:114.1720,
reg:"hybrid",
app:"youth",
dish:"Mango sago",
desc:"Trendy language targets youth culture.",
img:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Mango_sago.jpg"
},

{
name:"Din Tai Fung",
lat:22.2980,lng:114.1725,
reg:"global",
app:"premium",
dish:"Xiaolongbao",
desc:"Global discourse emphasizes consistency.",
img:"https://upload.wikimedia.org/wikipedia/commons/1/1c/Xiaolongbao.jpg"
},

{
name:"Ho Hung Kee",
lat:22.2790,lng:114.1580,
reg:"formal",

desc:"Michelin discourse signals quality.",
img:"https://upload.wikimedia.org/wikipedia/commons/4/45/Wonton_noodles.jpg"
},

{
name:"Joy Hing",
lat:22.2765,lng:114.1720,
reg:"informal",
app:"local",
dish:"BBQ pork rice",
desc:"Simple language reflects local identity.",
img:"https://upload.wikimedia.org/wikipedia/commons/5/59/Char_siu.jpg"
},

{
name:"Kam Wah Cafe",
lat:22.3245,lng:114.1695,
reg:"informal",
app:"classic",
dish:"Pineapple bun",
desc:"Everyday discourse reflects tradition.",
img:"https://upload.wikimedia.org/wikipedia/commons/2/2a/Pineapple_bun.jpg"
},

{
name:"Lin Heung Tea House",
lat:22.2845,lng:114.1525,
reg:"informal",
app:"traditional",
dish:"Dim sum",
desc:"Old-style discourse reflects heritage.",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Dim_sum.jpg"
},

{
name:"Crystal Jade",
lat:22.2950,lng:114.1700,
reg:"standardized",
app:"corporate",
dish:"Xiaolongbao",
desc:"Corporate discourse reflects chain branding.",
img:"https://upload.wikimedia.org/wikipedia/commons/1/1c/Xiaolongbao.jpg"
}

];

var markers=[];

function render(){

 markers.forEach(m=>map.removeLayer(m));
 markers=[];

 var s=document.getElementById("search").value.toLowerCase();
 var r=document.getElementById("reg").value;

 data.forEach(d=>{

  if(s && !d.name.toLowerCase().includes(s)) return;
  if(r!="all" && d.reg!=r) return;

  var m=L.marker([d.lat,d.lng]).addTo(map);

  m.bindPopup(`
   <div class="popup" style="width:220px">
   <img src="${d.img}">
   <b>${d.name}</b><br>
   ${d.dish}<br><br>

   <b>Discourse</b><br>
   Register: ${d.reg}<br>
   Appraisal: ${d.app}
   </div>
  `);

  markers.push(m);

 });

}

document.getElementById("search").oninput=render;
document.getElementById("reg").onchange=render;

render();

</script>

</body>
</html>
